# 建築基準法 技術基準ルール（旅館・ホテル用途変更時の主要規定）
# 各ルールは判定ロジックと組み合わせて使用される。

rules:
  # ---------- 法27条 特殊建築物の耐火要件 ----------
  law_27:
    rule_id: "law_27"
    rule_name: "法27条：特殊建築物の耐火要件"
    article: "建築基準法27条"
    triggers:
      # 3階以上の階に旅館用途がある場合 → 耐火建築物等
      three_floors_or_more: "3階以上の階を旅館用途とする → 耐火建築物等が必要"
      two_floor_300m2: "2階の旅館部分300㎡以上 → 耐火建築物等"
      two_floor_600m2: "2階の旅館部分600㎡以上 → 耐火建築物（または1時間準耐火）"
    impact: "high"

  # ---------- 令119条 廊下の幅 ----------
  ord_119:
    rule_id: "ord_119"
    rule_name: "令119条：廊下幅員"
    article: "建築基準法施行令119条"
    requirement:
      both_sides: 1.6  # 両側居室の廊下幅員 m
      one_side: 1.2  # その他
    note: "旅館・ホテルの客室部分の廊下は、両側居室なら1.6m以上、片側居室なら1.2m以上"
    impact: "medium"

  # ---------- 令120条 直通階段までの歩行距離 ----------
  ord_120:
    rule_id: "ord_120"
    rule_name: "令120条：直通階段までの歩行距離"
    article: "建築基準法施行令120条"
    distance:
      fireproof: 50  # 耐火・準耐火構造
      semi: 30  # その他
    note: "主要構造部が準耐火等で30〜50m以下、非耐火で30m以下"
    impact: "medium"

  # ---------- 令121条 二以上の直通階段 ----------
  ord_121:
    rule_id: "ord_121"
    rule_name: "令121条：二方向避難（直通階段が2以上必要）"
    article: "建築基準法施行令121条"
    triggers:
      non_fireproof_100m2: "宿泊室の床面積合計100㎡超（非耐火） → 2直通階段必要"
      fireproof_200m2: "宿泊室の床面積合計200㎡超（耐火・準耐火） → 2直通階段必要"
    impact: "high"

  # ---------- 令126条の2 排煙設備 ----------
  ord_126_2:
    rule_id: "ord_126_2"
    rule_name: "令126条の2：排煙設備"
    article: "建築基準法施行令126条の2"
    triggers:
      total_500m2: "床面積500㎡超で原則必要（特定の緩和規定あり）"
    note: "排煙無窓居室、200㎡超の居室等は排煙設備設置義務"
    impact: "medium"

  # ---------- 令126条の4 非常用照明 ----------
  ord_126_4:
    rule_id: "ord_126_4"
    rule_name: "令126条の4：非常用照明装置"
    article: "建築基準法施行令126条の4"
    note: "旅館の居室・避難経路（廊下・階段等）に必要"
    impact: "low"

  # ---------- 令128条の4・5 内装制限 ----------
  ord_128_4:
    rule_id: "ord_128_4"
    rule_name: "令128条の4・5：内装制限"
    article: "建築基準法施行令128条の4・5"
    triggers:
      total_200m2: "旅館で延床200㎡以上の階の居室部分は内装制限対象"
    note: "壁・天井の室内側下地・仕上げを難燃材料以上に"
    impact: "medium"

  # ---------- 法28条 採光・換気 ----------
  law_28:
    rule_id: "law_28"
    rule_name: "法28条：居室の採光・換気"
    article: "建築基準法28条"
    requirement:
      lighting_ratio: 0.1  # 旅館客室の有効採光面積 1/10
      ventilation_ratio: 0.05  # 有効換気面積 1/20
    note: "旅館客室：床面積の1/10以上の有効採光、1/20以上の有効換気"
    impact: "medium"

  # ---------- 令112条 防火区画 ----------
  ord_112:
    rule_id: "ord_112"
    rule_name: "令112条：防火区画（異種用途/竪穴区画）"
    article: "建築基準法施行令112条"
    note: "旅館部分と他用途の異種用途区画、階段・吹抜の竪穴区画"
    impact: "high"

  # ---------- 法20条 構造耐力（積載荷重） ----------
  law_20:
    rule_id: "law_20"
    rule_name: "法20条：構造耐力（積載荷重の変動）"
    article: "建築基準法20条"
    note: "用途変更後の積載荷重（旅館：1,800N/㎡相当）で構造再評価が必要"
    impact: "high"
